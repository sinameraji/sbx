# Multi-OS CI: everything that runs without a KVM/VZ host. Live microVM boots
# (smoke:fc, smoke:vz, check:applevz) are hardware-gated and run on dev boxes —
# see docs/plan.md Appendix A/B for the parity gates.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: agent/go.sum
      - run: npm ci
      - run: npm run build
      - name: agent unit tests
        run: npm run test:agent
      - name: firecracker host-agnostic checks
        run: npm run check:fc
      - name: agent protocol check (VM-free, unix socket)
        run: npm run check:agent
      - name: egress control-plane check (mock upstream)
        run: npm run check:egress
      - name: container smoke (real Docker, end-to-end)
        run: npm run smoke

  macos:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: agent/go.sum
      - run: npm ci
      - run: npm run build
      - name: agent unit tests
        run: npm run test:agent
      - name: firecracker host-agnostic checks
        run: npm run check:fc
      - name: agent protocol check (VM-free, unix socket)
        run: npm run check:agent
      - name: egress control-plane check (mock upstream)
        run: npm run check:egress
