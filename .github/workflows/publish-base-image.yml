# Build + publish the hotcell base sandbox image to GHCR, multi-arch (amd64 + arm64).
#
# Manual trigger: Actions tab → "publish base image" → Run workflow (on main).
# Uses the built-in GITHUB_TOKEN — no secrets to configure.
#
# ONE-TIME after the first successful run: make the package public so anyone can
# pull it — your avatar → Packages → hotcell-base → Package settings → Change
# visibility → Public. Then `--image ghcr.io/sinameraji/hotcell-base` works anywhere.
name: publish base image

on:
  workflow_dispatch:
    inputs:
      extra_tag:
        description: "Optional extra tag besides latest (e.g. 2026-07-19)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write # push to GHCR via GITHUB_TOKEN

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3 # arm64 emulation for the multi-arch build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hotcell-base
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.extra_tag }},enable=${{ inputs.extra_tag != '' }}
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: images/base
          file: images/base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
